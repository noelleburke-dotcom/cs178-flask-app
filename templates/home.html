<!DOCTYPE html>
<html lang="en">
<head>
    <title>Home Page</title>
     <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- display a flash message here, if necessary -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <div class="container">
        <h1 class="mt-5">User Management System</h1>
        <div class="mt-3">
            <!-- Add User Button -->
            <a href="/add-user" class="btn">Add User</a>
            <!-- Delete User Button -->
            <a href="/delete-user" class="btn">Delete User</a>
            <!-- Update User Button -->
            <a href="/update-user" class="btn">Update User</a>
            <!-- Display All Users Button -->
            <a href="/display-users" class="btn">Display All Users</a>
        </div>
    </div>
</body>
</html>
