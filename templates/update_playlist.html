<!doctype html>
<html lang="en">
<head>
    <title>Update Playlist</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='update_playlist.css') }}">
</head>
<body>
<div class="container mt-4">
    <h2>Updating {{ user['name'] }}'s Playlist</h2>

    <div class="row">
        <!-- Left: Current Playlist -->
        <div class="col-md-6">
            <h3>Current Playlist</h3>
            <ul class="list-group">
                {% for song in playlist %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    {{ song['title'] }} - {{ song['artist'] }} ({{song.duration}}s)
                    <form method="POST" style="margin:0;">
                        <input type="hidden" name="song_id" value="{{ song['song_id'] }}">
                        <input type="hidden" name="action" value="delete">
                        <button type="submit" class="btn btn-sm btn-danger">Remove</button>
                    </form>
                </li>
                {% endfor %}
            </ul>
        </div>

        <!-- Right: Add Songs -->
        <div class="col-md-6">
            <h3>Add a Song</h3>
            <form method="POST">
                <input type="hidden" name="action" value="add">
                <div class="mb-2">
                    <select name="song_id" class="form-control" required>
                        {% for song in all_songs %}
                            <option value="{{ song['song_id'] }}">{{ song['title'] }} - {{ song['artist'] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Add Song</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
